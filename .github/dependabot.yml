version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    allow:
      - dependency-name: "@modelcontextprotocol/sdk"
      - dependency-name: "effect"
      - dependency-name: "@effect/*"
      - dependency-name: "ws"
    groups:
      mcp-runtime:
        patterns:
          - "@modelcontextprotocol/sdk"
          - "effect"
          - "@effect/*"
          - "ws"
